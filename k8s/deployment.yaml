apiVersion: apps/v1
kind: Deployment
metadata:
  name: cargo-app
  labels:
    app: cargo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cargo-app
  template:
    metadata:
      labels:
        app: cargo-app
    spec:
      containers:
        - name: cargo-app
          image: cargo-app:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5